# The AI agent's guardrails, enforced at Teleport's proxy no matter what the
# LLM decides to run:
#   kubernetes_labels    → which clusters exist for the bot (env=prod never
#                          matches: production is invisible, not just denied)
#   kubernetes_resources → read-only verbs
#   kubernetes_groups    → impersonated on the kube API; bind "view" to the
#                          built-in view ClusterRole per cluster (README step 1)
kind: role
version: v8
metadata:
  name: sre-agent
  description: "AI SRE agent: read-only Kubernetes on dev/demo clusters; prod invisible"
spec:
  allow:
    kubernetes_labels:
      env: ["dev", "demo"]
    kubernetes_groups: ["view"]
    kubernetes_resources:
      - kind: "*"
        api_group: "*"
        namespace: "*"
        name: "*"
        verbs: ["get", "list", "watch"]
