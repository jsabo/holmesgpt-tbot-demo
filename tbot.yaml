# tbot: the agent's machine identity. Joins Teleport as bot "sre-agent",
# keeps short-lived certs renewed, and writes an auto-refreshing
# machine-id/kubeconfig.yaml scoped to the clusters selected below.
#
# Copy to tbot.local.yaml (gitignored), fill in proxy_server and the
# registration secret (README step 2), then:
#   tbot start -c tbot.local.yaml
#
# Why bound_keypair and not a plain token: token-joined identities can only
# renew within their TTL (~1h), so any longer downtime strands the bot.
# Bound keypair re-joins after ANY downtime — laptops, reboots, weekends.
version: v2
proxy_server: example.teleport.sh:443   # your Teleport proxy
onboarding:
  join_method: bound_keypair
  token: sre-agent-bound                # the token RESOURCE name, not a secret
  bound_keypair:
    registration_secret: PASTE_FROM_tctl_get_token   # one-time; consumed at first join
storage:
  type: directory
  path: ./tbot-storage
services:
  - type: kubernetes/v2
    selectors:
      # Each matching cluster becomes a kubeconfig context. The bot's ROLE is
      # what actually limits access — these just pick what to write out.
      # The FIRST selected cluster becomes the default context, and tbot
      # resets current-context to it on every renewal — so name the cluster
      # your demo targets first.
      # - name: my-demo-cluster
      - labels: { env: dev }
      - labels: { env: demo }
    destination:
      type: directory
      path: ./machine-id
      symlinks: insecure   # quiets a cosmetic macOS warning; absent on Linux
